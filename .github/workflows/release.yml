name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon — covers all Macs since late 2020. Intel Macs run
          # the arm64 build under Rosetta 2 with no perceivable hit for KEN.
          # GitHub's macos-13 (Intel) runner pool is deprecated and queues
          # for hours; not worth it.
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm deps
        run: npm ci

      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "KEN ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG](https://github.com/carlosarthurr1/Ken/commits/${{ github.ref_name }}) for what changed.

            ### Install
            - **macOS** (Apple Silicon native, runs on Intel via Rosetta 2): download the `.dmg`, drag KEN to Applications.
            - **Windows**: download the `.msi`, run it.

            First-launch on macOS may need `System Settings → Privacy & Security → Open Anyway` (KEN is unsigned).
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --no-sign
